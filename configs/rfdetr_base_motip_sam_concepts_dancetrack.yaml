# RF-DETR Base MOTIP - SAM Concepts (DanceTrack)
# Uses precomputed SAM masks as concept input (USE_CONCEPT_BOTTLENECK=True)
# RF-DETR-Base (DINOv2-Small encoder) trained on DanceTrack
# Standalone config (no super config) — mirrors r50_deformable_detr_motip_sam_concept_dancetrack.yaml

SUPER_CONFIG_PATH:          # Standalone — no parent config

# Seed:
SEED: 42

NUM_WORKERS: 2
PREFETCH_FACTOR: 2
DEVICE: cuda

# Data settings:
DATA_ROOT: ./data/
DATASETS: [DanceTrack]
DATASET_SPLITS: [train]
# Sampling:
SAMPLE_STEPS: [0, ]
SAMPLE_LENGTHS: [15, ]
SAMPLE_INTERVALS: [4, ]
LENGTH_PER_ITERATION:

# Data augmentation (RF-DETR: sizes divisible by 56):
AUG_RESIZE_SCALES: [400, 480, 512, 544, 576, 608]
AUG_MAX_SIZE: 800
AUG_RANDOM_RESIZE: [350, 450, 550]
AUG_RANDOM_CROP_MIN: 320
AUG_RANDOM_CROP_MAX: 500
AUG_MAX_SHIFT_RATIO: 0.06
AUG_OVERFLOW_BBOX: False
AUG_BRIGHTNESS: 0.4
AUG_CONTRAST: 0.4
AUG_SATURATION: 0.4
AUG_HUE: 0.2
AUG_COLOR_JITTER_V2: False
AUG_NUM_GROUPS: 6
AUG_TRAJECTORY_OCCLUSION_PROB: 0.5
AUG_TRAJECTORY_SWITCH_PROB: 0.5

# Model settings:
ONLY_DETR: False
NUM_CLASSES: 1
NUM_ID_VOCABULARY: 50
DETR_FRAMEWORK: rf_detr
FEATURE_DIM: 256
FFN_DIM_RATIO: 2
ID_DIM: 256
HEAD_DIM: 32
NUM_ID_DECODER_LAYERS: 6
ID_LOSS_WEIGHT: 1.0
REL_PE_LENGTH: 30
USE_AUX_LOSS: False
USE_SHARED_AUX_HEAD: True
USE_FOCAL_LOSS: False
# Deformable DETR base config (not used by RF-DETR, kept for compat):
BACKBONE: resnet50
DILATION: False
DETR_NUM_QUERIES: 300
DETR_NUM_FEATURE_LEVELS: 4
DETR_AUX_LOSS: True
DETR_WITH_BOX_REFINE: True
DETR_TWO_STAGE: False
DETR_HIDDEN_DIM: 256
DETR_MASKS: False
DETR_POSITION_EMBEDDING: sine
DETR_NUM_HEADS: 8
DETR_ENC_LAYERS: 6
DETR_DEC_LAYERS: 6
DETR_DIM_FEEDFORWARD: 1024
DETR_DROPOUT: 0.0
DETR_DEC_N_POINTS: 4
DETR_ENC_N_POINTS: 4
DETR_CLS_LOSS_COEF: 2.0
DETR_BBOX_LOSS_COEF: 5.0
DETR_GIOU_LOSS_COEF: 2.0
DETR_FOCAL_ALPHA: 0.25
DETR_SET_COST_CLASS: 2.0
DETR_SET_COST_BBOX: 5.0
DETR_SET_COST_GIOU: 2.0
DETR_CRITERION_BATCH_LEN: 10

# RF-DETR-Base architecture (DINOv2-Small / ViT-S/14 encoder):
RFDETR:
  ENCODER: dinov2_windowed_small
  RESOLUTION: 560                  # Divisible by patch size 14; SIZE_DIVISIBILITY=56
  HIDDEN_DIM: 256
  DEC_LAYERS: 3
  PATCH_SIZE: 14
  NUM_WINDOWS: 4
  POSITIONAL_ENCODING_SIZE: 37
  OUT_FEATURE_INDEXES: [2, 5, 8, 11]
  PROJECTOR_SCALE: [P4]
  SA_NHEADS: 8
  CA_NHEADS: 16
  DEC_N_POINTS: 2
  DIM_FEEDFORWARD: 2048
  TWO_STAGE: True
  LITE_REFPOINT_REFINE: True
  BBOX_REPARAM: True
  GROUP_DETR: 1
  IA_BCE_LOSS: True
  LAYER_NORM: True
  RMS_NORM: False
  FREEZE_ENCODER: False
  BACKBONE_LORA: False
  GRADIENT_CHECKPOINTING: True
  LOAD_DINOV2_WEIGHTS: True
  PRETRAIN_WEIGHTS: ./pretrains/rf-detr-base-coco.pth

# No classical concept head — SAM masks provide spatial features via bottleneck:
NUM_CONCEPTS: 0

# Training settings:
BATCH_SIZE: 1
LR: 1.0e-4
LR_BACKBONE_NAMES: [backbone.0]
LR_BACKBONE_SCALE: 0.1
LR_LINEAR_PROJ_NAMES: [reference_points, sampling_offsets]
LR_LINEAR_PROJ_SCALE: 0.05
LR_DICTIONARY_NAMES: [word_to_embed, embed_to_word]
LR_DICTIONARY_SCALE: 1.0
LR_WARMUP_EPOCHS: 1
WEIGHT_DECAY: 0.0005
MAX_CLIP_NORM: 0.1
EPOCHS: 10
SCHEDULER_MILESTONES: [6, 9]
SCHEDULER_GAMMA: 0.1
DETR_NUM_TRAIN_FRAMES: 2
DETR_NUM_CHECKPOINT_FRAMES: 5
USE_DECODER_CHECKPOINT: False
ACCUMULATE_STEPS: 2
SEPARATE_CLIP_NORM: True
USE_ACCELERATE_CLIP_NORM: True
SIZE_DIVISIBILITY: 56

# No DeformableDETR pretrain (RF-DETR uses its own weights):
DETR_PRETRAIN: null
RESUME_MODEL:
RESUME_OPTIMIZER: False
RESUME_SCHEDULER: False
RESUME_STATES: False

# Inference settings:
INFERENCE_MODEL:
INFERENCE_DATASET: DanceTrack
INFERENCE_SPLIT: val
INFERENCE_MODE: evaluate
INFERENCE_GROUP: default
INFERENCE_MAX_LONGER: 1440
INFERENCE_DTYPE: FP32
ASSIGNMENT_PROTOCOL: object-max
MISS_TOLERANCE: 30
DET_THRESH: 0.3
NEWBORN_THRESH: 0.6
ID_THRESH: 0.2
AREA_THRESH: 0
INFERENCE_ONLY_DETR:

# Outputs settings:
OUTPUTS_DIR:
USE_WANDB: False
EXP_OWNER: hellorpg
EXP_PROJECT: MOTIP
EXP_GROUP:
EXP_NAME: rfdetr_base_motip_sam_concept_dancetrack
GIT_VERSION:
SAVE_CHECKPOINT_PER_EPOCH: 1
MULTI_LAST_CHECKPOINTS: 4
LOGGING_INTERVAL: 2000

USE_PREVIOUS_CHECKPOINT: False

# SAM mask input:
OBJECT_MASK_ROOT: ./precomputed_sam_masks
USE_CONCEPT_BOTTLENECK: true

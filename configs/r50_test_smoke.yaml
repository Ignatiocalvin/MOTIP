SUPER_CONFIG_PATH:

# Seed:
SEED: 42

# System Settings:
NUM_WORKERS: 0
PREFETCH_FACTOR: 2
DEVICE: cuda

# Data settings:
DATA_ROOT: /pfs/work9/workspace/scratch/ma_ighidaya-thesis_ignatio/MOTIP_SAM/datasets/
DATASETS: [DanceTrack]
DATASET_SPLITS: [train]
SAMPLE_STEPS: [0, ]
SAMPLE_LENGTHS: [5, ]
SAMPLE_INTERVALS: [1, ]
LENGTH_PER_ITERATION:

# Data augmentation settings:
AUG_RESIZE_SCALES: [480, 512]
AUG_MAX_SIZE: 800
AUG_RANDOM_RESIZE: [400, 450, 500]
AUG_RANDOM_CROP_MIN: 320
AUG_RANDOM_CROP_MAX: 480
AUG_MAX_SHIFT_RATIO: 0.06
AUG_OVERFLOW_BBOX: False
AUG_BRIGHTNESS: 0.4
AUG_CONTRAST: 0.4
AUG_SATURATION: 0.4
AUG_HUE: 0.2
AUG_COLOR_JITTER_V2: False
AUG_NUM_GROUPS: 6
AUG_TRAJECTORY_OCCLUSION_PROB: 0.5
AUG_TRAJECTORY_SWITCH_PROB: 0.5

# Model settings:
ONLY_DETR: False
NUM_CLASSES: 1
NUM_ID_VOCABULARY: 50
DETR_FRAMEWORK: deformable_detr
FEATURE_DIM: 256
FFN_DIM_RATIO: 2
ID_DIM: 256
HEAD_DIM: 32
NUM_ID_DECODER_LAYERS: 6
ID_LOSS_WEIGHT: 1.0
REL_PE_LENGTH: 30
USE_AUX_LOSS: False
USE_SHARED_AUX_HEAD: True
USE_FOCAL_LOSS: False
NUM_CONCEPTS: 0

# DETR settings:
BACKBONE: resnet50
DILATION: False
DETR_NUM_QUERIES: 300
DETR_NUM_FEATURE_LEVELS: 4
DETR_AUX_LOSS: True
DETR_WITH_BOX_REFINE: True
DETR_TWO_STAGE: False
DETR_HIDDEN_DIM: 256
DETR_MASKS: False
DETR_POSITION_EMBEDDING: sine
DETR_NUM_HEADS: 8
DETR_ENC_LAYERS: 6
DETR_DEC_LAYERS: 6
DETR_DIM_FEEDFORWARD: 1024
DETR_DROPOUT: 0.0
DETR_DEC_N_POINTS: 4
DETR_ENC_N_POINTS: 4
DETR_CLS_LOSS_COEF: 2.0
DETR_BBOX_LOSS_COEF: 5.0
DETR_GIOU_LOSS_COEF: 2.0
DETR_FOCAL_ALPHA: 0.25
DETR_SET_COST_CLASS: 2.0
DETR_SET_COST_BBOX: 5.0
DETR_SET_COST_GIOU: 2.0
DETR_CRITERION_BATCH_LEN: 10

# Training strategies:
BATCH_SIZE: 1
LR: 1.0e-4
LR_BACKBONE_NAMES: [backbone.0]
LR_BACKBONE_SCALE: 0.1
LR_LINEAR_PROJ_NAMES: [reference_points, sampling_offsets]
LR_LINEAR_PROJ_SCALE: 0.05
LR_DICTIONARY_NAMES: [word_to_embed, embed_to_word]
LR_DICTIONARY_SCALE: 1.0
LR_WARMUP_EPOCHS: 0
WEIGHT_DECAY: 0.0005
MAX_CLIP_NORM: 0.1
EPOCHS: 1

# Limit epoch length for smoke test (set to null for a full epoch)
MAX_STEPS_PER_EPOCH: 30
SCHEDULER_MILESTONES: [1]
SCHEDULER_GAMMA: 0.1
DETR_NUM_TRAIN_FRAMES: 2
DETR_NUM_CHECKPOINT_FRAMES: 3
USE_DECODER_CHECKPOINT: False
ACCUMULATE_STEPS: 1
SEPARATE_CLIP_NORM: True
USE_ACCELERATE_CLIP_NORM: True

# Resumes and Pretrains:
DETR_PRETRAIN: ./pretrains/r50_deformable_detr_coco.pth
RESUME_MODEL:
RESUME_OPTIMIZER: False
RESUME_SCHEDULER: False
RESUME_STATES: False

# Inference settings (no eval during smoke test):
INFERENCE_MODEL:
INFERENCE_DATASET:
INFERENCE_SPLIT: val
INFERENCE_MODE: evaluate
INFERENCE_GROUP: default
INFERENCE_MAX_LONGER: 1333
INFERENCE_DTYPE: FP32
ASSIGNMENT_PROTOCOL: object-max
MISS_TOLERANCE: 30
DET_THRESH: 0.3
NEWBORN_THRESH: 0.6
ID_THRESH: 0.2
AREA_THRESH: 0
INFERENCE_ONLY_DETR:

# Outputs settings:
OUTPUTS_DIR: ./outputs/smoke_test
USE_WANDB: False
EXP_OWNER: test
EXP_PROJECT: MOTIP
EXP_GROUP: smoke
EXP_NAME: smoke_test_r50_dancetrack
GIT_VERSION:
SAVE_CHECKPOINT_PER_EPOCH: 0
MULTI_LAST_CHECKPOINTS: 0
LOGGING_INTERVAL: 5

USE_CONCEPT_BOTTLENECK: False
OBJECT_MASK_ROOT:

# RF-DETR Large MOTIP - P-DESTRE Base (no concepts), Fold 0, v4
# Resume from v3 checkpoint_1 (end of epoch 1) after NaN divergence at epoch 2 step ~30k.
#
# ROOT CAUSE OF NaN:
#   A numerically problematic batch was encountered at epoch 2, step ~27-30k.
#   The DETR detection losses (loss_bbox, loss_giou, loss_ce) all became NaN
#   simultaneously, collapsing the entire run. This is consistent with a
#   degenerate annotation (zero-size box → GIoU NaN) or attention overflow.
#   cardinality_error stayed numeric throughout, confirming the DETR head
#   sigmoid outputs were intact but the loss computation broke.
#
# WHY checkpoint_1 (not epoch_2_step_25000):
#   Intra-epoch checkpoints preserve the epoch 2 dataloader shuffle state, so
#   the same batch order would be replayed and the same NaN-triggering batch
#   would appear again ~5k steps later. checkpoint_1 starts epoch 2 with a
#   fresh shuffle, making it highly unlikely to re-hit the same bad batch.
#
# FIX: RESUME_OPTIMIZER: false
#   Resets Adam second-moment estimates to zero. Although checkpoint_1 was
#   saved before NaN (Apr 12 01:05, NaN started ~09:32), the optimizer
#   moments may contain accumulated instability from the rising grad_norm
#   spikes seen at steps 20k-25k (35.45, 35.60). Fresh moments reduce the
#   risk of repeated divergence. The small cost is ~500 steps of Adam warm-up.

SUPER_CONFIG_PATH: ./configs/rfdetr_large_motip_pdestre_base_fold0_v3.yaml

# Resume from v3's epoch 1 checkpoint (clean state before NaN diverged in epoch 2).
RESUME_MODEL: ./outputs/rfdetr_large_motip_pdestre_base_fold0_v3/checkpoint_1.pth

# Reset Adam optimizer state — clears accumulated second moments that may
# have been building toward instability; checkpoint_1 weights are healthy.
RESUME_OPTIMIZER: false

# Keep LR scheduler position so decay at milestone epoch 8 is preserved.
RESUME_SCHEDULER: true

# Continue from epoch 2 (start_epoch=2, global_step=~121k from checkpoint).
RESUME_STATES: true

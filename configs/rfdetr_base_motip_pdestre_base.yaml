# RF-DETR Base MOTIP Configuration for P-DESTRE
# BASE MODEL: No concept prediction (pure detection + ID tracking)
# For FAIR comparison with R50 Deformable DETR base model
# Uses DINOv2-Base instead of Large for comparable model size

SUPER_CONFIG_PATH: ./configs/r50_deformable_detr_motip_dancetrack.yaml

# --- Override DETR Framework ---
DETR_FRAMEWORK: rf_detr

# --- Data Settings ---
DATASETS: [P-DESTRE]
DATASET_SPLITS: [Train_0]  # Will be overridden by training script
INFERENCE_DATASET: P-DESTRE
INFERENCE_SPLIT: val_0

# --- Sampling Settings (REDUCED for memory efficiency) ---
SAMPLE_STEPS: [0, ]
SAMPLE_LENGTHS: [5, ]    # Reduced from 15 to 5 for less memory
SAMPLE_INTERVALS: [8, ]  # Increased from 4 to 8 for less memory

# --- RF-DETR Specific Settings ---
RFDETR:
  # Model size: Base (DINOv2-Base backbone) - comparable to ResNet-50
  ENCODER: dinov2_windowed_base
  RESOLUTION: 392                  # Input resolution (divisible by 14, smaller for base)
  HIDDEN_DIM: 256                  # Hidden dimension (base model, same as R50)
  DEC_LAYERS: 6                    # Number of decoder layers
  PATCH_SIZE: 14                   # ViT patch size
  NUM_WINDOWS: 2                   # Windowed attention
  POSITIONAL_ENCODING_SIZE: 25     # 392/14 - 3 = 25
  OUT_FEATURE_INDEXES: [3, 6, 9, 12]
  PROJECTOR_SCALE: [P4]
  
  # Attention settings (Base model)
  SA_NHEADS: 8                     # Self-attention heads (base model)
  CA_NHEADS: 16                    # Cross-attention heads (base model)
  DEC_N_POINTS: 4
  
  # Architecture settings
  TWO_STAGE: True
  LITE_REFPOINT_REFINE: True
  BBOX_REPARAM: True
  GROUP_DETR: 1
  IA_BCE_LOSS: True
  
  # Backbone settings
  LAYER_NORM: True
  RMS_NORM: False
  FREEZE_ENCODER: False
  BACKBONE_LORA: False
  GRADIENT_CHECKPOINTING: True   # Enable to save memory
  LOAD_DINOV2_WEIGHTS: True
  
  # Pretrained weights
  PRETRAIN_WEIGHTS: ./pretrains/rf-detr-base-coco.pth

# --- Model Settings ---
NUM_CLASSES: 1
DETR_NUM_QUERIES: 300
DETR_AUX_LOSS: True
DETR_HIDDEN_DIM: 256               # Match base model dimension

# --- NO CONCEPTS (Pure MOTIP without semantic attributes) ---
# Override base config's NUM_CONCEPTS: 3 to disable concept prediction
NUM_CONCEPTS: 0
# Intentionally omit MOTIP.CONCEPT_CLASSES → N_CONCEPTS defaults to 0

# --- Training Settings ---
EPOCHS: 1
BATCH_SIZE: 1                      # Start with 1, can increase if memory allows
LR: 1.0e-4
LR_BACKBONE_SCALE: 0.1
LR_WARMUP_EPOCHS: 0
WEIGHT_DECAY: 0.0005
MAX_CLIP_NORM: 0.1
ACCUMULATE_STEPS: 2                # Simulate batch size 2

# --- Disable DeformableDETR pretrain (RF-DETR uses own weights) ---
DETR_PRETRAIN: null

# --- Tracking Settings ---
NUM_WORKERS: 5
PREFETCH_FACTOR: 4
SIZE_DIVISIBILITY: 32

# --- ID Prediction Settings ---
NUM_ID_VOCABULARY: 1000
ID_DIM: 256
NUM_ID_DECODER_LAYERS: 3
HEAD_DIM: 64
REL_PE_LENGTH: 50
USE_AUX_LOSS: True
USE_SHARED_AUX_HEAD: True

# --- Feature Settings ---
FEATURE_DIM: 256                   # Must match RFDETR.HIDDEN_DIM

# --- Evaluation Settings ---
EVAL_DURING_TRAIN: True
EVAL_DURING_TRAIN_EPOCHS: [0]

# --- Checkpoint Settings ---
USE_PREVIOUS_CHECKPOINT: True
SAVE_CHECKPOINT_PER_EPOCH: 1
MULTI_LAST_CHECKPOINTS: 4

# RF-DETR Large MOTIP - P-DESTRE Base (no concepts), Fold 0, v2
# Fix over v1: SCHEDULER_MILESTONES corrected for a 10-epoch run.
# The dancetrack super config sets [6, 9] which decays LR to near-zero
# too early. [8] keeps full LR for epochs 0-7 then decays once at epoch 8.
# All other hyperparameters unchanged from v1 for fair comparison.

SUPER_CONFIG_PATH: ./configs/rfdetr_large_motip_pdestre_base.yaml

# --- Fold ---
DATASET_SPLITS: [Train_0]
INFERENCE_SPLIT: val_0

# --- Fix LR schedule only ---
SCHEDULER_MILESTONES: [8]

# --- Fresh start ---
USE_PREVIOUS_CHECKPOINT: False
RESUME_MODEL: null
RESUME_OPTIMIZER: false
RESUME_SCHEDULER: false
RESUME_STATES: false
